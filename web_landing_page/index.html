<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة بوصلة التعليمية - قريباً</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #EF4444;
            /* Red-500 */
            --secondary-color: #DC2626;
            /* Red-600 */
            --accent-color: #F87171;
            /* Red-400 */
            --text-color: #F3F4F6;
            --bg-gradient-start: #000000;
            /* Pure Black */
            --bg-gradient-end: #1a0505;
            /* Dark Red-Black */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Animated Background Shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 50vw;
            height: 50vw;
            max-width: 400px;
            max-height: 400px;
            background: #B91C1C;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 40vw;
            height: 40vw;
            max-width: 300px;
            max-height: 300px;
            background: #7F1D1D;
            bottom: -5%;
            right: -5%;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 30vw;
            height: 30vw;
            max-width: 200px;
            max-height: 200px;
            background: #991B1B;
            top: 40%;
            left: 20%;
            animation-delay: -10s;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 3rem 2rem;
            background: rgba(20, 5, 5, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 2rem;
            border: 1px solid rgba(239, 68, 68, 0.15);
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 90%;
            /* Use percentage to ensure gaps on sides */
            max-width: 550px;
            margin-inline: auto;
            /* Ensure centering works in RTL */
            animation: containerFadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .logo-container {
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .logo {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(220, 38, 38, 0.4));
            animation: spin 2s linear infinite;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #EF4444, #FCA5A5 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.3s forwards;
            letter-spacing: -1px;
        }

        h2 {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            font-weight: 600;
            color: #E2E8F0;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.5s forwards;
        }

        .loader-bar {
            width: 100%;
            max-width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            margin: 0 auto 1.5rem auto;
            overflow: hidden;
            position: relative;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.7s forwards;
        }

        .loader-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #DC2626, #EF4444, #F87171);
            background-size: 200% 100%;
            border-radius: 10px;
            animation: load 2s infinite ease-in-out, shimmer 2s linear infinite;
        }

        .footer {
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
            color: #94A3B8;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.9s forwards;
        }

        /* Animations */
        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(30px, -40px);
            }

            66% {
                transform: translate(-20px, 20px);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes containerFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes load {
            0% {
                left: -40%;
                width: 30%;
            }

            50% {
                left: 30%;
                width: 60%;
            }

            100% {
                left: 100%;
                width: 30%;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Media Queries for FULL Responsiveness */

        /* 1. Very Small Phones (e.g. Galaxy Fold, iPhone SE) */
        @media (max-width: 380px) {
            .container {
                padding: 1.5rem 1rem;
                width: 95%;
                /* Use more width on tiny screens */
            }

            h1 {
                font-size: 1.8rem;
            }

            h2 {
                font-size: 1rem;
                margin-bottom: 1.5rem;
            }

            .logo {
                width: 80px;
            }
        }

        /* 2. Standard Mobile (Portrait) */
        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
                background: rgba(20, 5, 5, 0.85);
                /* More opaque */
            }

            .shape {
                opacity: 0.2;
            }

            /* Less distracting background */
        }

        /* 3. Landscape Mobile / Short Screens */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 10px;
                align-items: flex-start;
                overflow-y: auto;
            }

            .container {
                margin-top: 20px;
                margin-bottom: 20px;
                padding: 1.5rem;
            }

            .logo {
                width: 70px;
            }

            h1 {
                font-size: 2rem;
                margin-bottom: 0.2rem;
            }

            h2 {
                font-size: 1rem;
                margin-bottom: 1rem;
            }

            .logo-container {
                margin-bottom: 0.5rem;
            }
        }

        /* 4. Tablets & iPads */
        @media (min-width: 768px) and (max-width: 1024px) {
            .container {
                padding: 4rem 3rem;
                max-width: 650px;
            }

            h1 {
                font-size: 4rem;
            }

            h2 {
                font-size: 2rem;
            }
        }

        /* 5. Large Desktops */
        @media (min-width: 1440px) {
            .container {
                max-width: 800px;
                padding: 5rem;
            }

            h1 {
                font-size: 5rem;
            }

            h2 {
                font-size: 2.5rem;
            }

            .logo {
                width: 180px;
            }
        }
    </style>
</head>

<body>

    <!-- Background Shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <div class="container">
        <div class="logo-container">
            <!-- Ensure logo_icon.png exists in the same folder -->
            <img src="logo_icon.png" alt="شعار منصة بوصلة" class="logo">
        </div>

        <h1>انتظرونا قريباً</h1>
        <h2>في منصة بوصلة التعليمية</h2>

        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>

        <p class="footer">جاري العمل على تحضير تجربة تعليمية استثنائية لكم</p>
    </div>

</body>

</html>
